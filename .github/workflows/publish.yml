name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  # The tag is only a trigger. Confirm the tagged commit actually lives on main,
  # then everything below builds and ships from the main branch.
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure the tag is on main
        run: |
          git fetch --no-tags origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF_NAME ($GITHUB_SHA) is on main."
          else
            echo "::error::Tag $GITHUB_REF_NAME is not on main; refusing to publish."
            exit 1
          fi

  # Gate: run the full CI suite (lint, type-check, tests) against main.
  ci:
    needs: guard
    uses: ./.github/workflows/ci.yml
    with:
      ref: main

  build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
